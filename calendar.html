<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقويم الموسم · كشافة كنائس زايد</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;600;700;900&family=Reem+Kufi:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/shared.css">
<style>
  .cal-hero {
    background: linear-gradient(160deg, var(--indigo) 0%, var(--indigo-deep) 100%);
    color:#fff; padding:56px 24px 44px; text-align:center; position:relative; overflow:hidden;
  }
  .cal-hero::before{content:'';position:absolute;top:-100px;left:-80px;width:280px;height:280px;
    background:radial-gradient(circle,rgba(45,138,150,0.25)0%,transparent 70%);border-radius:50%;}
  .cal-hero::after{content:'';position:absolute;bottom:-90px;right:-70px;width:240px;height:240px;
    background:radial-gradient(circle,rgba(255,107,91,0.18)0%,transparent 70%);border-radius:50%;}
  .cal-hero-inner{position:relative;z-index:2;max-width:820px;margin:0 auto;}
  .cal-hero .eyebrow{font-family:var(--font-accent);font-size:12px;letter-spacing:6px;color:var(--gold);margin-bottom:12px;}
  .cal-hero h1{font-family:var(--font-display);font-size:clamp(34px,5vw,52px);margin:0 0 10px;}
  .cal-hero .verse{font-family:var(--font-display);font-style:italic;font-size:18px;color:var(--coral-light);}
  .cal-hero .meta-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:22px;}
  .cal-pill{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);padding:8px 16px;
    border-radius:20px;font-size:12px;font-weight:600;font-family:var(--font-modern);backdrop-filter:blur(8px);}

  /* Filters */
  .cal-filters{background:var(--paper-warm);padding:16px 24px;border-bottom:1px solid rgba(45,138,150,0.08);
    position:sticky;top:56px;z-index:50;}
  .cal-filters-inner{max-width:1100px;margin:0 auto;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .cal-filter{background:#fff;border:1px solid rgba(45,138,150,0.2);color:var(--ink-soft);padding:7px 14px;
    border-radius:100px;font-family:var(--font-modern);font-size:13px;cursor:pointer;transition:all .2s;}
  .cal-filter:hover{border-color:var(--teal);color:var(--teal-deep);}
  .cal-filter.active{background:var(--teal-deep);border-color:var(--teal-deep);color:#fff;}

  /* Timeline */
  .timeline{max-width:1000px;margin:0 auto;padding:40px 24px 60px;position:relative;}
  .timeline::before{content:'';position:absolute;top:40px;bottom:60px;right:140px;width:2px;
    background:linear-gradient(180deg,var(--teal),var(--coral),var(--gold));opacity:0.3;}
  @media(max-width:680px){.timeline::before{right:54px;}}

  .tl-item{display:flex;gap:22px;margin-bottom:22px;align-items:stretch;position:relative;
    animation:fade-in-up .6s ease both;}
  .tl-date{flex:0 0 120px;text-align:left;padding-top:18px;}
  @media(max-width:680px){.tl-date{flex:0 0 44px;}.tl-date .d-full{display:none;}}
  .tl-date .d-day{font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--indigo);line-height:1.2;}
  .tl-date .d-full{font-size:11px;color:var(--ink-soft);font-family:var(--font-modern);}
  .tl-node{flex:0 0 36px;display:flex;justify-content:center;position:relative;z-index:2;padding-top:18px;}
  .tl-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:16px;background:#fff;box-shadow:0 3px 10px var(--shadow);border:2px solid var(--teal);}
  .tl-card{flex:1;background:#fff;border-radius:16px;padding:18px 20px;box-shadow:0 4px 16px var(--shadow);
    border:1px solid rgba(45,138,150,0.1);border-right:5px solid var(--teal);transition:all .2s;}
  .tl-card:hover{transform:translateX(-4px);box-shadow:0 10px 26px var(--shadow-md);}
  .tl-type{font-family:var(--font-accent);font-size:10px;letter-spacing:2px;font-weight:700;
    text-transform:uppercase;margin-bottom:6px;display:inline-block;}
  .tl-card h3{font-family:var(--font-accent);font-size:18px;color:var(--indigo);margin-bottom:6px;}
  .tl-card p{font-size:13px;color:var(--ink-soft);line-height:1.6;margin-bottom:10px;}
  .tl-sectors{display:flex;gap:6px;flex-wrap:wrap;}
  .tl-sec{font-size:11px;font-weight:600;padding:3px 10px;border-radius:10px;font-family:var(--font-modern);}
  .sec-cubs{background:rgba(255,140,66,0.15);color:#c2410c;}
  .sec-junior{background:rgba(139,30,63,0.12);color:var(--burgundy);}
  .sec-advanced{background:var(--teal-fade);color:var(--teal-deep);}
  .legend{max-width:1000px;margin:0 auto;padding:0 24px 40px;display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-soft);font-family:var(--font-modern);}
  .legend-dot{width:14px;height:14px;border-radius:4px;}
</style>
</head>
<body>

<div id="topnav-mount"></div>

<header class="cal-hero">
  <div class="cal-hero-inner">
    <div class="eyebrow">SEASON CALENDAR · تقويم الموسم</div>
    <h1>تقويم موسم ٢٠٢٦</h1>
    <div class="verse">«لاَ يَغْلِبَنَّكَ الشَّرُّ، بَلِ اغْلِبِ الشَّرَّ بِالْخَيْرِ»</div>
    <div class="meta-row" id="meta-row"></div>
  </div>
</header>

<div class="cal-filters">
  <div class="cal-filters-inner">
    <button class="cal-filter active" data-f="all" onclick="setFilter('all')">كل المحطات</button>
    <button class="cal-filter" data-f="advanced" onclick="setFilter('advanced')">🟢 المتقدم</button>
    <button class="cal-filter" data-f="junior" onclick="setFilter('junior')">🔴 المبتدئ</button>
    <button class="cal-filter" data-f="cubs" onclick="setFilter('cubs')">🟠 الأشبال</button>
    <button class="cal-filter" data-f="camp" onclick="setFilter('camp')">⛺ المعسكرات</button>
    <button class="cal-filter" data-f="party" onclick="setFilter('party')">🎉 الحفلات</button>
  </div>
</div>

<div class="legend" id="legend"></div>
<div class="timeline" id="timeline"></div>

<div id="footer-mount"></div>

<script src="assets/zs.js"></script>
<script src="assets/calendar_data.js"></script>
<script>
  ZS.requireAuth();
  ZS.mountChrome('calendar');

  const C = SEASON_CALENDAR_2026;
  let filter = 'all';

  // Meta pills
  document.getElementById('meta-row').innerHTML = [
    `📅 ${C.meetingDay} · ${C.meetingTime}`,
    `⛵ كشافة بحرية`,
    `📍 ${C.venue}`
  ].map(t => `<span class="cal-pill">${t}</span>`).join('');

  // Legend
  document.getElementById('legend').innerHTML = Object.values(C.types).map(t =>
    `<span class="legend-item"><span class="legend-dot" style="background:${t.color}"></span>${t.emoji} ${t.label}</span>`
  ).join('');

  const SEC_LABEL = { cubs:'أشبال', junior:'مبتدئ', advanced:'متقدم' };

  function matches(ev){
    if (filter === 'all') return true;
    if (filter === 'camp') return ev.type === 'camp';
    if (filter === 'party') return ev.type === 'party';
    return ev.sectors && ev.sectors.includes(filter);
  }

  function render(){
    const tl = document.getElementById('timeline');
    const items = C.events.filter(matches);
    if (!items.length){ tl.innerHTML = '<p style="text-align:center;color:var(--ink-soft)">مفيش محطات للفلتر ده.</p>'; return; }
    tl.innerHTML = items.map((ev,i) => {
      const t = C.types[ev.type] || C.types.meeting;
      const secs = (ev.sectors||[]).map(s =>
        `<span class="tl-sec sec-${s}">${SEC_LABEL[s]||s}</span>`).join('');
      return `
        <div class="tl-item" style="animation-delay:${i*0.04}s">
          <div class="tl-date">
            <div class="d-day">${ev.date}</div>
            <div class="d-full">${t.label}</div>
          </div>
          <div class="tl-node"><div class="tl-dot" style="border-color:${t.color}">${t.emoji}</div></div>
          <div class="tl-card" style="border-right-color:${t.color}">
            <span class="tl-type" style="color:${t.color}">${t.label}</span>
            <h3>${ev.title}</h3>
            ${ev.note ? `<p>${ev.note}</p>` : ''}
            <div class="tl-sectors">${secs}</div>
          </div>
        </div>`;
    }).join('');
  }

  function setFilter(f){
    filter = f;
    document.querySelectorAll('.cal-filter').forEach(b => b.classList.toggle('active', b.dataset.f === f));
    render();
  }

  render();
</script>

</body>
</html>
